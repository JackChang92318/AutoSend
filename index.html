<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>傳送訊息</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <h3>LIFF Debug</h3>
  <pre id="debug"></pre>

  <script>
    const LIFF_ID = "2010525282-22yCgSgG";
    const debug = document.getElementById("debug");

    function log(text) {
      debug.textContent += text + "\n";
      console.log(text);
    }

    function base64Utf8Decode(base64) {
      const normalized = base64.replace(/-/g, "+").replace(/_/g, "/");
      const binary = atob(normalized);
      const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
      return new TextDecoder("utf-8").decode(bytes);
    }

    function getMessage() {
      const params = new URLSearchParams(window.location.search);
      let raw = params.get("msg");

      if (!raw && params.get("liff.state")) {
        const state = params.get("liff.state");
        const stateParams = new URLSearchParams(
          state.startsWith("?") ? state : "?" + state
        );
        raw = stateParams.get("msg");
      }

      return raw ? base64Utf8Decode(raw) : null;
    }

    (async () => {
      try {
        log("目前網址：" + location.href);
        log("UserAgent：" + navigator.userAgent);

        await liff.init({
          liffId: LIFF_ID,
          withLoginOnExternalBrowser: true
        });

        log("liff.init 成功");
        log("isInClient: " + liff.isInClient());
        log("isLoggedIn: " + liff.isLoggedIn());
        log("LINE version: " + liff.getLineVersion());

        const context = liff.getContext();
        log("context.type: " + context.type);
        log("context.viewType: " + context.viewType);
        log("context.scope: " + JSON.stringify(context.scope));

        const message = getMessage();
        log("message: " + message);

        if (!message) {
          log("沒有 msg，不送出");
          return;
        }

        if (!liff.isInClient()) {
          log("目前不是 LIFF browser，不能使用 sendMessages");
          log("你現在開到的是 external / LINE in-app browser");
          return;
        }

        if (
          context.type !== "utou" &&
          context.type !== "group" &&
          context.type !== "room"
        ) {
          log("目前不是從聊天室啟動，不能送到聊天室");
          return;
        }

        if (!context.scope || !context.scope.includes("chat_message.write")) {
          log("LIFF app 沒有 chat_message.write scope");
          return;
        }

        await liff.sendMessages([
          {
            type: "text",
            text: message
          }
        ]);

        log("sendMessages 成功");
        liff.closeWindow();

      } catch (err) {
        log("錯誤名稱：" + err.name);
        log("錯誤訊息：" + err.message);
        console.error(err);
      }
    })();
  </script>
</body>
</html>
