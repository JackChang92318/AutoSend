<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>傳送訊息</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <script>
    (async () => {
      const LIFF_ID = "YOUR_LIFF_ID"; // ← 換成你的 LIFF ID

      // 從 URL 參數取得訊息（Base64 編碼），例如 ?msg=5L2g5aW9
      const params = new URLSearchParams(window.location.search);
      const raw = params.get("msg");
      const message = raw ? decodeURIComponent(atob(raw)) : null;

      if (!message) {
        // 沒有帶訊息參數就直接關閉
        liff.init({ liffId: LIFF_ID }).then(() => liff.closeWindow());
        return;
      }

      try {
        await liff.init({ liffId: LIFF_ID });

        // sendMessages 只在 LINE 內部瀏覽器且 chat context 下有效
        await liff.sendMessages([
          {
            type: "text",
            text: message,
          },
        ]);
      } catch (err) {
        console.error("LIFF sendMessages 失敗:", err);
      } finally {
        liff.closeWindow();
      }
    })();
  </script>
</body>
</html>
