<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <title>Auto Send</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <script>
    const LIFF_ID = "2010525282-22yCgSgG";

    function getParam(name) {
      const params = new URLSearchParams(location.search);
      const direct = params.get(name);
      if (direct) return direct;

      const state = params.get("liff.state");
      if (state) {
        try {
          const url = new URL("https://example.com" + state);
          return url.searchParams.get(name);
        } catch (e) {
          return null;
        }
      }

      return null;
    }

    async function main() {
      const raw = getParam("msg");
      const text = raw ? decodeURIComponent(atob(raw)) : null;

      try {
        await liff.init({ liffId: LIFF_ID });
      } catch (e) {
        return;
      }

      if (!liff.isInClient() || !text) return;

      try {
        await liff.sendMessages([{ type: "text", text }]);
      } catch (e) {
        // 靜默失敗
      } finally {
        liff.closeWindow();
      }
    }

    main();
  </script>
</body>
</html>
