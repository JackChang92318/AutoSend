<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <title>Auto Send</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>
  <script>
    const LIFF_ID = "2010525282-22yCgSgG";

    function getParam(name) {
      const params = new URLSearchParams(location.search);

      const direct = params.get(name);
      if (direct) return direct;

      const state = params.get("liff.state");
      if (!state) return null;

      const candidates = [state];

      try {
        candidates.push(decodeURIComponent(state));
      } catch (e) {}

      for (const candidate of candidates) {
        let queryPart = candidate;

        const questionIndex = candidate.indexOf("?");
        if (questionIndex >= 0) {
          queryPart = candidate.slice(questionIndex);
        }

        if (!queryPart.startsWith("?")) {
          queryPart = "?" + queryPart.replace(/^\/+/, "");
        }

        const stateParams = new URLSearchParams(queryPart);
        const value = stateParams.get(name);

        if (value) return value;
      }

      return null;
    }

    function base64Utf8Decode(base64) {
      let normalized = base64.replace(/-/g, "+").replace(/_/g, "/");

      while (normalized.length % 4) {
        normalized += "=";
      }

      const binary = atob(normalized);
      const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
      return new TextDecoder("utf-8").decode(bytes);
    }

    async function main() {
      try {
        await liff.init({ liffId: LIFF_ID });

        const raw = getParam("msg");

        if (!raw) {
          return;
        }

        if (!liff.isInClient()) {
          alert("請從 LINE 聊天室中的 LIFF 連結開啟");
          return;
        }

        const text = base64Utf8Decode(raw);

        await liff.sendMessages([
          {
            type: "text",
            text: text
          }
        ]);

        liff.closeWindow();

      } catch (error) {
        alert("傳送失敗：" + (error.message || error));
      }
    }

    main();
  </script>
</body>
</html>
